<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廚房計時人員出勤預排班表 - 五甲國中</title>
    <style>
        :root {
            --ink: #263238;
            --muted: #607d8b;
            --line: #d8e0e5;
            --soft: #f4f8fb;
            --accent: #2e7d5b;
            --accent-dark: #24684a;
            --warn: #c62828;
            --info-bg: #eef7fb;
            --info-line: #b7d9e8;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            color: var(--ink);
            background: #f6f7f3;
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        }
        .container {
            max-width: 1080px;
            margin: 0 auto;
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(38, 50, 56, 0.12);
        }
        h2 { margin: 0 0 18px; text-align: center; color: #263238; }
        h3 { margin: 0 0 12px; font-size: 20px; }
        .section {
            margin-top: 18px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        label { font-weight: 700; }
        select, button, input[type="text"], textarea {
            padding: 8px 10px;
            font-size: 16px;
            border: 1px solid #b8c5cc;
            border-radius: 4px;
            font-family: inherit;
        }
        textarea {
            width: 100%;
            min-height: 92px;
            resize: vertical;
            line-height: 1.5;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 700;
        }
        button:hover { background-color: var(--accent-dark); }
        button:disabled { background-color: #99a4aa; cursor: not-allowed; }
        button.secondary { background: #546e7a; }
        button.secondary:hover { background: #455a64; }
        button.warning { background: #b44a35; }
        button.warning:hover { background: #963a29; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #c8d2d8; padding: 9px; text-align: center; }
        th { background-color: #edf3f6; }
        td.left { text-align: left; }
        .holiday-note {
            color: #a43f32;
            font-size: 0.95em;
            margin-bottom: 14px;
            text-align: center;
            font-weight: bold;
        }
        .deadline-warning {
            color: white;
            background-color: #d9534f;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 14px;
            display: none;
        }
        .summer-vacation-msg {
            color: #2a6496;
            background-color: #d9edf7;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin: 20px 0;
            border: 1px solid #bce8f1;
            display: none;
        }
        .save-status {
            color: #31708f;
            background-color: var(--info-bg);
            border: 1px solid var(--info-line);
            border-radius: 5px;
            padding: 9px 12px;
            margin-bottom: 12px;
            text-align: center;
            display: none;
        }
        .hint {
            color: var(--muted);
            line-height: 1.6;
            margin: 0 0 10px;
        }
        .status-pill {
            display: inline-block;
            min-width: 72px;
            padding: 4px 8px;
            border-radius: 999px;
            color: #fff;
            font-weight: 700;
            background: #78909c;
        }
        .status-pill.done { background: #2e7d5b; }
        .status-pill.pending { background: #b26a00; }
        .status-pill.leave { background: #b44a35; }
        .merge-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .person-card {
            border: 1px solid var(--line);
            background: var(--soft);
            border-radius: 8px;
            padding: 12px;
        }
        .person-card strong { display: block; margin-bottom: 8px; }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }
        .content-box {
            background: #f8fafb;
            border: 1px dashed #aab8c0;
            padding: 12px;
            border-radius: 8px;
        }
        .admin-toggle {
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
        }
        .admin-panel {
            display: none;
            border-color: #b7c8d0;
            background: #fbfdfd;
        }
        .admin-panel.active { display: block; }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }
        .color-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: var(--soft);
        }
        .color-card input[type="color"] {
            width: 100%;
            height: 40px;
            padding: 2px;
            border: 1px solid #b8c5cc;
            border-radius: 4px;
            background: #fff;
        }
        .name-chip {
            display: inline-block;
            min-width: 72px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
        }
        input:disabled, select:disabled {
            background-color: #eef0f1;
            cursor: not-allowed;
            border: 1px dashed #b8c5cc;
            color: #64737b;
        }
        select.leave-status { color: var(--warn); font-weight: bold; }
        #printArea { display: none; }

        @media (max-width: 760px) {
            body { padding: 10px; }
            .container { padding: 14px; }
            .merge-grid { grid-template-columns: 1fr; }
            .color-grid { grid-template-columns: 1fr; }
            th, td { padding: 7px 5px; font-size: 14px; }
            select, button, input[type="text"], textarea { font-size: 15px; }
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body { background: #fff; padding: 0; }
            .container { box-shadow: none; max-width: none; padding: 0; }
            .no-print { display: none !important; }
            #printArea { display: block !important; }
            .print-sheet {
                break-after: page;
                page-break-after: always;
                break-inside: avoid;
                page-break-inside: avoid;
                padding: 12mm;
            }
            .print-sheet:last-child {
                break-after: auto;
                page-break-after: auto;
            }
            .print-title {
                text-align: center;
                font-size: 22px;
                font-weight: 700;
                margin: 0 0 4px;
            }
            .print-month {
                text-align: center;
                font-size: 18px;
                margin: 0 0 10px;
            }
            .print-sheet table { font-size: 16px; }
            .print-sheet th, .print-sheet td {
                border: 1px solid #000;
                padding: 7px;
                height: 34px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2>廚房計時人員出勤預排班表 (五甲國中)</h2>

        <div id="deadlineMsg" class="deadline-warning"></div>
        <div id="summerMsg" class="summer-vacation-msg"></div>
        <div id="saveStatus" class="save-status"></div>

        <div class="controls">
            <label for="yearSelect">填寫月份</label>
            <select id="yearSelect" onchange="checkDeadline()"></select> 年
            <select id="monthSelect" onchange="checkDeadline()"></select> 月
            <label for="staffSelect">填表人</label>
            <select id="staffSelect" onchange="switchStaff()"></select>
            <button id="genBtn" onclick="generateSchedule()">產生預覽</button>
        </div>

        <div class="holiday-note">
            註：系統已排除例假日、國定假日。8月份僅需填寫開學日 (8/31) 之班表。
        </div>

        <form id="scheduleForm">
            <table id="scheduleTable">
                <thead>
                    <tr>
                        <th>序號</th>
                        <th>日期</th>
                        <th>星期</th>
                        <th>我的出勤狀態</th>
                        <th>代班人員 (請假才填寫)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="button-row">
                <button type="button" id="submitBtn" onclick="submitData()" style="padding: 12px 34px; font-size: 18px; border-radius: 30px;">確認並送出我的班表</button>
            </div>
        </form>

        <div class="admin-toggle">
            <button type="button" class="secondary" onclick="toggleAdminPanel()">管理者功能</button>
        </div>

        <section id="adminPanel" class="section admin-panel">
            <h3>兩人資料合併狀態</h3>
            <p class="hint">此區供管理者彙整兩位人員資料、產出簽到表與列印使用，一般填表人不需要操作。</p>
            <div id="mergeStatus" class="merge-grid"></div>
            <div class="button-row">
                <button type="button" class="secondary" onclick="renderPrintableSheets()">產出兩人出勤簽到表</button>
                <button type="button" class="secondary" onclick="printSheets()">列印 / 另存 PDF</button>
                <button type="button" class="warning" onclick="clearMonthData()">清除本月暫存合併資料</button>
            </div>

            <h3 style="margin-top:22px;">簽到表顏色管理</h3>
            <p class="hint">顏色會套用在簽到表「排班」欄，方便區分原排班人員與代班人員。</p>
            <div id="colorSettings" class="color-grid"></div>

            <h3 style="margin-top:22px;">提交內容</h3>
            <p class="hint">管理者可在此產生目前選定填表人的提交內容，或由試算表資料整理後貼到下方匯入。</p>
            <div class="content-box">
                <textarea id="submissionContent" readonly placeholder="管理者按下產生後，這裡會顯示可複製的提交內容。"></textarea>
                <div class="button-row">
                    <button type="button" class="secondary" onclick="buildCurrentSubmissionContent()">產生目前填表人的提交內容</button>
                    <button type="button" class="secondary" onclick="copySubmissionContent()">複製提交內容</button>
                </div>
            </div>

            <h3 style="margin-top:22px;">匯入提交內容</h3>
            <p class="hint">貼上提交內容，再按匯入。系統會依月份與姓名合併，不會覆蓋其他月份。</p>
            <textarea id="importContent" placeholder="請貼上提交內容"></textarea>
            <div class="button-row">
                <button type="button" onclick="importSubmissionContent()">匯入並合併</button>
            </div>
        </section>
    </div>

    <div id="printArea"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyYt9OjXf8rxAmOAEkQ1-hlfuEyXjQe9NvxxxbqR-gTWH6MaVlaM_u9egYUvq46zTU/exec";
    const STORAGE_PREFIX = "chefScheduleMerged";
    const COLOR_STORAGE_KEY = "chefScheduleNameColors";
    const defaultStaff = ["溫美萍", "郭恒妘"];
    const defaultNameColors = {
        "溫美萍": "#dff3e8",
        "郭恒妘": "#e4efff",
        "代班人員": "#fff1c7"
    };
    const nationalHolidays = [
        "2026-04-03", "2026-04-06", "2026-05-01", "2026-06-19",
        "2026-09-25", "2026-09-28", "2026-10-09", "2026-10-26", "2026-12-25"
    ];

    window.onload = function() {
        const today = new Date();
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const staffSelect = document.getElementById('staffSelect');
        const currentYear = today.getFullYear();

        for (let i = currentYear; i <= currentYear + 1; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i;
            yearSelect.appendChild(opt);
        }
        for (let i = 1; i <= 12; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = i;
            monthSelect.appendChild(opt);
        }
        defaultStaff.forEach(name => {
            let opt = document.createElement('option');
            opt.value = name;
            opt.innerHTML = name;
            staffSelect.appendChild(opt);
        });

        let nextMonthDate = new Date(today.getFullYear(), today.getMonth() + 1, 1);
        yearSelect.value = nextMonthDate.getFullYear();
        monthSelect.value = nextMonthDate.getMonth() + 1;

        checkDeadline();
        generateSchedule();
        renderColorSettings();
    };

    function checkDeadline() {
        const targetYear = parseInt(document.getElementById('yearSelect').value);
        const targetMonth = parseInt(document.getElementById('monthSelect').value);
        const now = new Date();
        const msgDiv = document.getElementById('deadlineMsg');
        const summerDiv = document.getElementById('summerMsg');
        const submitBtn = document.getElementById('submitBtn');
        const genBtn = document.getElementById('genBtn');
        const form = document.getElementById('scheduleForm');

        if (targetMonth === 7) {
            summerDiv.style.display = "block";
            summerDiv.innerHTML = "7月份為暑假期間，全月不須填寫排班表。";
            msgDiv.style.display = "none";
            submitBtn.disabled = true;
            genBtn.disabled = true;
            form.style.display = "none";
            renderMergeStatus();
            return;
        } else {
            summerDiv.style.display = "none";
            form.style.display = "block";
        }

        let prevMonthDate = new Date(targetYear, targetMonth - 1, 0);
        while (prevMonthDate.getDay() === 0 || prevMonthDate.getDay() === 6 || isNationalHoliday(prevMonthDate)) {
            prevMonthDate.setDate(prevMonthDate.getDate() - 1);
        }

        const deadline = new Date(prevMonthDate.getFullYear(), prevMonthDate.getMonth(), prevMonthDate.getDate(), 12, 0, 0);
        const formattedDeadline = `${deadline.getFullYear() - 1911}年${deadline.getMonth() + 1}月${deadline.getDate()}日 中午 12:00`;

        if (now > deadline) {
            msgDiv.style.display = "block";
            msgDiv.style.backgroundColor = "#d9534f";
            msgDiv.innerHTML = `提交期限已過！<br>${targetMonth}月班表的截止時間為：${formattedDeadline}。<br>目前已無法提交資料。`;
            submitBtn.disabled = true;
            genBtn.disabled = true;
        } else {
            msgDiv.style.display = "block";
            msgDiv.style.backgroundColor = "#5bc0de";
            msgDiv.innerHTML = `填寫提醒：${targetMonth}月班表請於 ${formattedDeadline} 前提交完畢。`;
            submitBtn.disabled = false;
            genBtn.disabled = false;
        }
    }

    function isNationalHoliday(date) {
        let dateString = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        return nationalHolidays.includes(dateString);
    }

    function getStorageKey(year, month) {
        return `${STORAGE_PREFIX}:${year}-${String(month).padStart(2, '0')}`;
    }

    function getSelectedYearMonth() {
        return {
            year: document.getElementById('yearSelect').value,
            month: document.getElementById('monthSelect').value
        };
    }

    function getCurrentStaff() {
        return document.getElementById('staffSelect').value || defaultStaff[0];
    }

    function showSaveStatus(message) {
        const status = document.getElementById('saveStatus');
        status.innerText = message;
        status.style.display = "block";
    }

    function getWorkdays(year, month) {
        const lastDay = new Date(year, month, 0).getDate();
        const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        const days = [];

        for (let day = 1; day <= lastDay; day++) {
            if (month === 8 && day <= 30) continue;

            let currentDate = new Date(year, month - 1, day);
            if (currentDate.getDay() !== 0 && currentDate.getDay() !== 6 && !isNationalHoliday(currentDate)) {
                days.push({
                    date: `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`,
                    label: `${month}月${day}日`,
                    weekday: weekdays[currentDate.getDay()]
                });
            }
        }

        return days;
    }

    function emptyMonthState(year, month) {
        return {
            year: String(year),
            month: String(month),
            submissions: {}
        };
    }

    function loadMonthState(year, month) {
        const raw = localStorage.getItem(getStorageKey(year, month));
        if (!raw) return emptyMonthState(year, month);

        try {
            const state = JSON.parse(raw);
            if (!state.submissions) state.submissions = {};
            return state;
        } catch (error) {
            localStorage.removeItem(getStorageKey(year, month));
            return emptyMonthState(year, month);
        }
    }

    function saveMonthState(state) {
        localStorage.setItem(getStorageKey(state.year, state.month), JSON.stringify(state));
    }

    function loadNameColors() {
        const raw = localStorage.getItem(COLOR_STORAGE_KEY);
        if (!raw) return { ...defaultNameColors };

        try {
            return { ...defaultNameColors, ...JSON.parse(raw) };
        } catch (error) {
            localStorage.removeItem(COLOR_STORAGE_KEY);
            return { ...defaultNameColors };
        }
    }

    function saveNameColors(colors) {
        localStorage.setItem(COLOR_STORAGE_KEY, JSON.stringify(colors));
    }

    function getNameColor(name) {
        const colors = loadNameColors();
        return colors[name] || colors["代班人員"] || "#fff1c7";
    }

    function renderColorSettings() {
        const colors = loadNameColors();
        const container = document.getElementById('colorSettings');
        if (!container) return;

        container.innerHTML = [
            ...defaultStaff.map(name => ({ key: name, label: name })),
            { key: "代班人員", label: "代班人員" }
        ].map(item => `
            <div class="color-card">
                <label for="color_${item.key}">${item.label}</label>
                <input type="color" id="color_${item.key}" value="${colors[item.key]}" onchange="updateNameColor('${item.key}', this.value)">
            </div>
        `).join("");
    }

    function updateNameColor(name, color) {
        const colors = loadNameColors();
        colors[name] = color;
        saveNameColors(colors);
        renderPrintableSheets(false);
        showSaveStatus("簽到表顏色已更新。");
    }

    function toggleAdminPanel() {
        const panel = document.getElementById('adminPanel');
        panel.classList.toggle('active');
        if (panel.classList.contains('active')) {
            renderMergeStatus();
            renderColorSettings();
        }
    }

    function switchStaff() {
        loadPersonalDraft();
        renderMergeStatus();
    }

    function generateSchedule() {
        const { year, month } = getSelectedYearMonth();
        const targetYear = parseInt(year);
        const targetMonth = parseInt(month);
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (targetMonth === 7) return;

        getWorkdays(targetYear, targetMonth).forEach((day, index) => {
            let tr = document.createElement('tr');
            tr.id = `row_${day.date}`;
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${day.label}</td>
                <td>${day.weekday}</td>
                <td>
                    <select id="status_${day.date}" onchange="checkLeave('${day.date}'); savePersonalDraft();">
                        <option value="出勤">出勤</option>
                        <option value="請假">請假</option>
                    </select>
                </td>
                <td><input type="text" id="sub_${day.date}" placeholder="輸入代班姓名" oninput="savePersonalDraft()" disabled></td>
            `;
            tbody.appendChild(tr);
        });

        loadPersonalDraft();
        renderMergeStatus();
    }

    function checkLeave(dateStr) {
        const status = document.getElementById(`status_${dateStr}`);
        const subInput = document.getElementById(`sub_${dateStr}`);
        if (!status || !subInput) return;

        const isLeave = status.value === "請假";
        status.classList.toggle("leave-status", isLeave);
        subInput.disabled = !isLeave;
        if (!isLeave) subInput.value = "";
    }

    function collectPersonalData() {
        const rows = document.querySelectorAll('#tableBody tr');
        let personalRows = [];
        let hasError = false;

        rows.forEach(row => {
            const dateStr = row.id.replace('row_', '');
            const status = document.getElementById(`status_${dateStr}`).value;
            const substitute = document.getElementById(`sub_${dateStr}`).value.trim();
            if (status === "請假" && substitute === "") hasError = true;
            personalRows.push({ date: dateStr, status, substitute });
        });

        return { personalRows, hasError };
    }

    function savePersonalDraft(isSubmitted = false) {
        const { year, month } = getSelectedYearMonth();
        const staff = getCurrentStaff();
        const { personalRows } = collectPersonalData();
        const state = loadMonthState(year, month);
        const previous = state.submissions[staff] || {};

        state.submissions[staff] = {
            staff,
            rows: personalRows,
            submitted: isSubmitted || previous.submitted || false,
            submittedAt: isSubmitted ? new Date().toISOString() : previous.submittedAt || "",
            savedAt: new Date().toISOString()
        };

        saveMonthState(state);
        renderMergeStatus();
        showSaveStatus(isSubmitted ? "已送出，並已在此瀏覽器暫存本次填報資料。" : "已自動暫存目前填表人的資料。");
    }

    function loadPersonalDraft() {
        const { year, month } = getSelectedYearMonth();
        const staff = getCurrentStaff();
        const state = loadMonthState(year, month);
        const submission = state.submissions[staff];

        document.querySelectorAll('#tableBody tr').forEach(row => {
            const dateStr = row.id.replace('row_', '');
            const status = document.getElementById(`status_${dateStr}`);
            const subInput = document.getElementById(`sub_${dateStr}`);
            const item = submission && Array.isArray(submission.rows)
                ? submission.rows.find(entry => entry.date === dateStr)
                : null;

            status.value = item ? item.status : "出勤";
            checkLeave(dateStr);
            subInput.value = item && item.substitute ? item.substitute : "";
        });

        document.getElementById('saveStatus').style.display = submission ? "block" : "none";
        if (submission) showSaveStatus(submission.submitted ? "已載入此人員上次送出後的暫存資料。" : "已載入此人員尚未送出的暫存資料。");
    }

    function getEffectiveName(staff, item) {
        if (!item) return "";
        return item.status === "請假" ? item.substitute : staff;
    }

    function findRow(submission, dateStr) {
        if (!submission || !Array.isArray(submission.rows)) return null;
        return submission.rows.find(item => item.date === dateStr) || null;
    }

    function mergeFinalData(state) {
        const year = parseInt(state.year);
        const month = parseInt(state.month);
        const days = getWorkdays(year, month);

        return days.map(day => {
            const staff1Submission = state.submissions[defaultStaff[0]];
            const staff2Submission = state.submissions[defaultStaff[1]];
            const staff1Row = findRow(staff1Submission, day.date);
            const staff2Row = findRow(staff2Submission, day.date);
            const substituteNotes = [];

            if (staff1Row && staff1Row.status === "請假") substituteNotes.push(`${defaultStaff[0]}請假：${staff1Row.substitute}`);
            if (staff2Row && staff2Row.status === "請假") substituteNotes.push(`${defaultStaff[1]}請假：${staff2Row.substitute}`);

            return {
                date: day.date,
                staff1: getEffectiveName(defaultStaff[0], staff1Row) || defaultStaff[0],
                staff2: getEffectiveName(defaultStaff[1], staff2Row) || defaultStaff[1],
                substitute: substituteNotes.join("；")
            };
        });
    }

    function renderMergeStatus() {
        const { year, month } = getSelectedYearMonth();
        const state = loadMonthState(year, month);
        const container = document.getElementById('mergeStatus');
        if (!container) return;
        container.innerHTML = "";

        defaultStaff.forEach(staff => {
            const submission = state.submissions[staff];
            const leaveCount = submission && Array.isArray(submission.rows)
                ? submission.rows.filter(row => row.status === "請假").length
                : 0;
            const card = document.createElement('div');
            card.className = "person-card";
            card.innerHTML = `
                <strong>${staff}</strong>
                <span class="status-pill ${submission && submission.submitted ? 'done' : 'pending'}">${submission && submission.submitted ? '已提交' : '待提交'}</span>
                <p class="hint" style="margin-top:8px;">請假 ${leaveCount} 日${submission && submission.submittedAt ? `<br>提交時間：${formatDateTime(submission.submittedAt)}` : ""}</p>
            `;
            container.appendChild(card);
        });
    }

    function formatDateTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function buildSubmissionContent(staff, state) {
        const submission = state.submissions[staff];
        return JSON.stringify({
            type: "五甲國中廚房計時人員排班提交內容",
            version: 1,
            year: state.year,
            month: state.month,
            staff,
            submittedAt: submission.submittedAt,
            rows: submission.rows
        }, null, 2);
    }

    function buildCurrentSubmissionContent() {
        const { year, month } = getSelectedYearMonth();
        const staff = getCurrentStaff();
        const state = loadMonthState(year, month);
        const submission = state.submissions[staff];

        if (!submission || !Array.isArray(submission.rows)) {
            alert("目前選定的填表人尚未有暫存或送出資料。");
            return;
        }

        document.getElementById('submissionContent').value = buildSubmissionContent(staff, state);
        showSaveStatus(`已產生 ${staff} 的提交內容。`);
    }

    function copySubmissionContent() {
        const content = document.getElementById('submissionContent').value.trim();
        if (!content) {
            alert("目前沒有可複製的提交內容，請先送出班表。");
            return;
        }

        navigator.clipboard.writeText(content)
            .then(() => alert("已複製提交內容。"))
            .catch(() => {
                document.getElementById('submissionContent').select();
                alert("已選取提交內容，請手動複製。");
            });
    }

    function importSubmissionContent() {
        const raw = document.getElementById('importContent').value.trim();
        if (!raw) {
            alert("請先貼上提交內容。");
            return;
        }

        let imported;
        try {
            imported = JSON.parse(raw);
        } catch (error) {
            alert("提交內容格式無法讀取，請確認複製完整。");
            return;
        }

        if (imported.type !== "五甲國中廚房計時人員排班提交內容" || !defaultStaff.includes(imported.staff) || !Array.isArray(imported.rows)) {
            alert("提交內容不是本系統可合併的格式。");
            return;
        }

        const { year, month } = getSelectedYearMonth();
        if (String(imported.year) !== String(year) || String(imported.month) !== String(month)) {
            alert(`這份提交內容是 ${imported.year}年${imported.month}月，請先切換到相同月份再匯入。`);
            return;
        }

        const state = loadMonthState(year, month);
        state.submissions[imported.staff] = {
            staff: imported.staff,
            rows: imported.rows,
            submitted: true,
            submittedAt: imported.submittedAt || new Date().toISOString(),
            savedAt: new Date().toISOString()
        };
        saveMonthState(state);

        document.getElementById('importContent').value = "";
        loadPersonalDraft();
        renderMergeStatus();
        showSaveStatus(`已匯入 ${imported.staff} 的提交內容並完成合併。`);
    }

    function clearMonthData() {
        const { year, month } = getSelectedYearMonth();
        if (!confirm(`確定清除 ${year}年${month}月 在此瀏覽器的暫存與合併資料嗎？`)) return;

        localStorage.removeItem(getStorageKey(year, month));
        document.getElementById('submissionContent').value = "";
        document.getElementById('importContent').value = "";
        generateSchedule();
        showSaveStatus("本月暫存合併資料已清除。");
    }

    function submitData() {
        const { year, month } = getSelectedYearMonth();
        const staff = getCurrentStaff();
        const { hasError } = collectPersonalData();

        if (hasError) {
            alert("有請假的日期請填寫代班人員姓名！");
            return;
        }

        savePersonalDraft(false);
        const state = loadMonthState(year, month);
        const submittedAt = new Date().toISOString();
        const payload = {
            year,
            month,
            submittedBy: staff,
            submittedAt,
            personalData: state.submissions[staff].rows,
            finalData: mergeFinalData(state)
        };

        const btn = document.getElementById('submitBtn');
        btn.innerText = "資料傳送中...";
        btn.disabled = true;

        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                const successState = loadMonthState(year, month);
                successState.submissions[staff].submitted = true;
                successState.submissions[staff].submittedAt = submittedAt;
                successState.submissions[staff].savedAt = new Date().toISOString();
                saveMonthState(successState);
                const refreshedState = loadMonthState(year, month);
                renderMergeStatus();
                alert(`${staff} 的 ${year}年${month}月班表已成功傳送。`);
            } else {
                alert("提交失敗：" + data.message);
            }
        })
        .catch(error => {
            alert("網路連線錯誤，請重試！(" + error + ")");
        })
        .finally(() => {
            btn.innerText = "確認並送出我的班表";
            btn.disabled = false;
        });
    }

    function renderPrintableSheets(showMissingAlert = true) {
        const { year, month } = getSelectedYearMonth();
        const state = loadMonthState(year, month);
        const missing = defaultStaff.filter(staff => !state.submissions[staff] || !state.submissions[staff].submitted);

        if (missing.length > 0) {
            if (showMissingAlert) alert(`尚未匯入或提交：${missing.join("、")}。請先合併兩人的提交內容，再產出完整簽到表。`);
            return false;
        }

        const printArea = document.getElementById('printArea');
        const finalData = mergeFinalData(state);
        const days = getWorkdays(parseInt(year), parseInt(month));
        const rocYear = parseInt(year) - 1911;
        const staffKeys = [
            { name: defaultStaff[0], key: "staff1" },
            { name: defaultStaff[1], key: "staff2" }
        ];

        printArea.innerHTML = staffKeys.map(staff => {
            const rows = finalData.map((item, index) => {
                const day = days.find(entry => entry.date === item.date);
                const name = item[staff.key];
                const isSubstitute = !defaultStaff.includes(name);
                const background = getNameColor(isSubstitute ? "代班人員" : name);
                return `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${day.label}</td>
                        <td>${day.weekday}</td>
                        <td style="background:${background};"><span class="name-chip">${name}</span></td>
                        <td></td>
                    </tr>
                `;
            }).join("");

            return `
                <section class="print-sheet">
                    <div class="print-title">廚房計時人員出勤簽到表(${staff.name})</div>
                    <div class="print-month">${rocYear}年${parseInt(month)}月份</div>
                    <table>
                        <thead>
                            <tr>
                                <th style="width:10%;">序號</th>
                                <th style="width:22%;">日期</th>
                                <th style="width:14%;">星期</th>
                                <th style="width:24%;">排班</th>
                                <th>簽到欄</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </section>
            `;
        }).join("");

        printArea.style.display = "block";
        showSaveStatus("已產出兩人的出勤簽到表，可按「列印 / 另存 PDF」。");
        printArea.scrollIntoView({ behavior: "smooth", block: "start" });
        return true;
    }

    function printSheets() {
        if (renderPrintableSheets()) {
            setTimeout(() => window.print(), 100);
        }
    }
</script>
</body>
</html>
